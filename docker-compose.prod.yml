services:
  web:
    image: ghcr.io/rogeriothe/financeiro:latest
    command: uv run python src/manage.py runserver 0.0.0.0:8000
    env_file:
      - .env
    environment:
      DJANGO_DEBUG: ${DJANGO_DEBUG:-false}
      POSTGRES_DB: ${POSTGRES_DB:-financeiro}
      POSTGRES_USER: ${POSTGRES_USER:-financeiro}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-financeiro}
      POSTGRES_HOST: db
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
    volumes:
      - staticfiles:/app/staticfiles
    expose:
      - "8000"
    restart: always
    depends_on:
      db:
        condition: service_healthy
    labels:
      - "com.centurylinklabs.watchtower.enable=true"

  nginx:
    image: nginx:1.27-alpine
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - staticfiles:/app/staticfiles:ro
    ports:
      - 8000:80
    restart: always
    depends_on:
      - web

  telegram-bot:
    image: ghcr.io/rogeriothe/financeiro:latest
    command: uv run python src/manage.py run_telegram_bot
    env_file:
      - .env
    environment:
      DJANGO_DEBUG: ${DJANGO_DEBUG:-false}
      POSTGRES_DB: ${POSTGRES_DB:-financeiro}
      POSTGRES_USER: ${POSTGRES_USER:-financeiro}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-financeiro}
      POSTGRES_HOST: db
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
    restart: always
    depends_on:
      db:
        condition: service_healthy
    labels:
      - "com.centurylinklabs.watchtower.enable=true"

  db:
    image: postgres:16-alpine
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-financeiro}
      POSTGRES_USER: ${POSTGRES_USER:-financeiro}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-financeiro}
    volumes:
      - ./pg_data:/var/lib/postgresql/data
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5

  watchtower:
    image: containrrr/watchtower
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      WATCHTOWER_LABEL_ENABLE: "true"
      WATCHTOWER_CLEANUP: "true"
      WATCHTOWER_POLL_INTERVAL: "300"
      WATCHTOWER_ROLLING_RESTART: "true"
    restart: always

volumes:
  staticfiles:
