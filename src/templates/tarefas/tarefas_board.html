{% extends "base.html" %}

{% block title %}Tarefas{% endblock %}

{% block extra_head %}
<!-- Alpine.js -->
<script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
<!-- Sortable.js -->
<script src="https://cdn.jsdelivr.net/npm/sortablejs@latest/Sortable.min.js"></script>
<style>
  .ghost-box {
    opacity: 0.5;
    background: #e9ecef;
    border: 1px dashed #adb5bd;
  }
  .task-list-container {
    min-width: 320px;
    max-width: 350px;
    flex-shrink: 0;
  }
</style>
{% endblock %}

{% block content %}
<div class="container-fluid" x-data="taskBoard()" x-init="initBoard()">
  <div class="d-flex align-items-center justify-content-between mb-4">
    <h3 class="mb-0">Quadro de Tarefas</h3>
    <button class="btn btn-primary" @click="createNewList()">+ Nova Lista</button>
  </div>

  <div class="d-flex gap-4 overflow-x-auto pb-3 align-items-start" style="min-height: calc(100vh - 200px);">
    <template x-for="list in lists" :key="list.id">
      <div class="card shadow-sm task-list-container bg-light">
        <div class="card-header bg-white d-flex justify-content-between align-items-center border-bottom-0 py-3">
          <h6 class="mb-0 fw-bold flex-grow-1" x-text="list.name" @dblclick="renameList(list)"></h6>
          <div class="d-flex gap-2">
            <button class="btn btn-sm btn-link text-secondary text-decoration-none p-0" title="Renomear lista" @click="renameList(list)">✎</button>
            <button class="btn btn-sm btn-link text-danger text-decoration-none p-0" title="Apagar lista" @click="deleteList(list.id)">&times;</button>
          </div>
        </div>
        <div class="card-body p-2 d-flex flex-column gap-2 sortable-list" :data-list-id="list.id" style="min-height: 50px;">
          <template x-for="task in getTasksForList(list.id)" :key="task.id">
            <div class="card border-0 shadow-sm task-item" :data-task-id="task.id" style="cursor: grab;">
              <div class="card-body p-3">
                <div class="d-flex align-items-start gap-2">
                  <input class="form-check-input mt-1" type="checkbox" :checked="task.is_completed" @change="toggleTask(task)">
                  <div class="flex-grow-1">
                    <p class="mb-1 fw-medium" :class="task.is_completed ? 'text-decoration-line-through text-muted' : ''" x-text="task.title"></p>
                    <template x-if="task.description">
                      <small class="text-muted d-block" x-text="task.description"></small>
                    </template>
                  </div>
                  <div class="d-flex flex-column gap-1">
                    <button class="btn btn-sm btn-link text-secondary p-0 opacity-50 hover-opacity-100 text-decoration-none" title="Editar tarefa" @click="renameTask(task)">✎</button>
                    <button class="btn btn-sm btn-link text-danger p-0 opacity-50 hover-opacity-100 text-decoration-none" title="Apagar tarefa" @click="deleteTask(task.id)">&times;</button>
                  </div>
                </div>
              </div>
            </div>
          </template>
        </div>
        <div class="card-footer bg-transparent border-0 pt-0">
          <button class="btn btn-sm btn-outline-secondary w-100 mt-2 text-start" @click="createNewTask(list.id)">
            + Adicionar tarefa
          </button>
        </div>
      </div>
    </template>
  </div>
</div>

<script>
  function taskBoard() {
    return {
      lists: [],
      tasks: [],
      
      initBoard() {
        this.fetchLists();
        this.fetchTasks();
      },

      async fetchLists() {
        const res = await fetch('/api/tarefas/lists');
        this.lists = await res.json();
        this.$nextTick(() => { this.initSortable() });
      },

      async fetchTasks() {
        const res = await fetch('/api/tarefas/tasks');
        this.tasks = await res.json();
      },

      getTasksForList(listId) {
        return this.tasks.filter(t => t.task_list === listId).sort((a,b) => a.order - b.order);
      },

      async createNewList() {
        const name = prompt("Nome da nova lista:");
        if (!name) return;
        
        try {
          const res = await fetch(`/api/tarefas/lists?name=${encodeURIComponent(name)}`, { 
            method: 'POST',
            headers: {'X-CSRFToken': '{{ csrf_token }}'}
          });
          if (res.ok) {
            const newList = await res.json();
            this.lists.push(newList);
            this.$nextTick(() => { this.initSortable() });
          }
        } catch (e) { console.error(e) }
      },

      async renameList(list) {
        const newName = prompt("Novo nome da lista:", list.name);
        if (!newName || newName === list.name) return;

        try {
          const res = await fetch(`/api/tarefas/lists/${list.id}`, {
            method: 'PUT',
            headers: {
              'Content-Type': 'application/json',
              'X-CSRFToken': '{{ csrf_token }}'
            },
            body: JSON.stringify({ name: newName })
          });
          if (res.ok) {
            const updated = await res.json();
            const idx = this.lists.findIndex(l => l.id === list.id);
            if (idx !== -1) {
              this.lists[idx].name = updated.name;
            }
          }
        } catch (e) { console.error(e) }
      },

      async deleteList(id) {
        if(!confirm("Tem certeza que deseja remover esta lista?")) return;
        const res = await fetch(`/api/tarefas/lists/${id}`, {
          method: 'DELETE',
          headers: {'X-CSRFToken': '{{ csrf_token }}'}
        });
        if(res.ok) {
          this.lists = this.lists.filter(l => l.id !== id);
          this.tasks = this.tasks.filter(t => t.task_list !== id);
        }
      },

      async createNewTask(listId) {
        const title = prompt("Título da tarefa:");
        if (!title) return;
        
        const payload = {
          task_list_id: listId,
          title: title,
          description: ""
        };

        const res = await fetch(`/api/tarefas/tasks`, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'X-CSRFToken': '{{ csrf_token }}'
          },
          body: JSON.stringify(payload)
        });

        if (res.ok) {
          const newTask = await res.json();
          this.tasks.push(newTask);
        }
      },

      async toggleTask(task) {
        task.is_completed = !task.is_completed;
        await fetch(`/api/tarefas/tasks/${task.id}`, {
          method: 'PUT',
          headers: {
            'Content-Type': 'application/json',
            'X-CSRFToken': '{{ csrf_token }}'
          },
          body: JSON.stringify({ is_completed: task.is_completed })
        });
      },

      async renameTask(task) {
        const newTitle = prompt("Novo título da tarefa:", task.title);
        if (!newTitle || newTitle === task.title) return;

        try {
          const res = await fetch(`/api/tarefas/tasks/${task.id}`, {
            method: 'PUT',
            headers: {
              'Content-Type': 'application/json',
              'X-CSRFToken': '{{ csrf_token }}'
            },
            body: JSON.stringify({ title: newTitle })
          });
          if (res.ok) {
            const updated = await res.json();
            const taskObj = this.tasks.find(t => t.id === task.id);
            if (taskObj) {
              taskObj.title = updated.title;
            }
          }
        } catch (e) { console.error(e) }
      },

      async deleteTask(id) {
        await fetch(`/api/tarefas/tasks/${id}`, {
          method: 'DELETE',
          headers: {'X-CSRFToken': '{{ csrf_token }}'}
        });
        this.tasks = this.tasks.filter(t => t.id !== id);
      },

      initSortable() {
        const containers = document.querySelectorAll('.sortable-list');
        containers.forEach(el => {
          // Destory if already initialized
          if(el.sortableInstance) {
            el.sortableInstance.destroy();
          }
          el.sortableInstance = new Sortable(el, {
            group: 'shared',
            animation: 150,
            ghostClass: 'ghost-box',
            onEnd: async (evt) => {
              const taskId = evt.item.dataset.taskId;
              const newListId = evt.to.dataset.listId;
              const newIndex = evt.newIndex;
              
              // Optimistically update frontend arrays
              const taskObj = this.tasks.find(t => t.id == taskId);
              if(taskObj) {
                taskObj.task_list = parseInt(newListId);
                // The order is a bit harder to compute locally without tracking all array positions
                // Let's send the command to backend and then refetch to sync order cleanly
                await fetch(`/api/tarefas/tasks/reorder`, {
                  method: 'POST',
                  headers: {
                    'Content-Type': 'application/json',
                    'X-CSRFToken': '{{ csrf_token }}'
                  },
                  body: JSON.stringify({
                    task_id: parseInt(taskId),
                    task_list_id: parseInt(newListId),
                    new_order: newIndex
                  })
                });
                // Sync from backend
                this.fetchTasks();
              }
            }
          });
        });
      }
    }
  }
</script>
{% endblock %}
